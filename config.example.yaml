# Stateful replay benchmark configuration.
#
# Copy to config.yaml and edit for your AWS VM. All paths must be absolute on
# the VM where run.py is executed.

besu:
  # Image must support engine_newPayloadV5 (Amsterdam fork) and the
  # blockAccessList / slotNumber payload fields produced by the input data.
  image: hyperledger/besu:latest
  container_name: besu-bench

  # Snapshot directory. Treated as the read-only lowerdir of the overlay; the
  # snapshot itself is never written to.
  data_snapshot_dir: /data/besu

  # Overlay scratch root. Must contain (or will be created with) upper/, work/,
  # merged/. Wiped at the start of every sweep when run.reset_overlay is true.
  overlay_dir: /data/besu-overlay

  # 32-byte hex JWT secret shared by Besu and the runner.
  # Generate once: `openssl rand -hex 32 | sudo tee /data/jwt.hex >/dev/null`.
  jwt_secret_path: /data/jwt.hex

  # Engine API endpoint as reachable from the host running run.py.
  # With `--network host` this is 127.0.0.1:8551.
  engine_url: http://127.0.0.1:8551

  # Extra arguments appended to the `besu` command line inside the container.
  # Tune for your snapshot's network / storage format.
  extra_args:
    - --network=DEV
    - --sync-mode=FULL
    - --data-storage-format=BONSAI
    - --rpc-http-enabled=false

  # Seconds to wait for the Engine API to become responsive after `docker run`.
  startup_timeout_s: 120

input:
  # Directory containing funding.txt, gas-bump.txt, setup/, testing/.
  dir: /home/ubuntu/reproduce-8038/generated-stateful-tests-stateful-perf-devnet-3-24656413846

  # Files replayed before any test, in the listed order.
  prelude:
    - funding.txt
    - gas-bump.txt

tests:
  setup_subdir: setup
  testing_subdir: testing

  # Glob over basenames in setup_subdir. Matched names must also exist in
  # testing_subdir; pairs that don't match are skipped with a warning.
  # Examples:
  #   "*"                                   -> all 1136 tests
  #   "*BALANCE*30M*"                       -> only BALANCE 30M cases
  #   "test_account_query.py__*"            -> all account_query tests
  filter: "*"

  # alphabetical | as_listed | shuffled
  order: alphabetical

run:
  # Reset (umount + wipe upper/work + remount) the overlay at the start of
  # every sweep. Set false to resume from previous run's writes.
  reset_overlay: true

  # Per-sweep timestamped subdirectory is created under this path.
  log_dir: ./runs

  # Per-request HTTP timeout (seconds).
  request_timeout_s: 120

  # Stop the sweep on the first non-VALID response.
  fail_fast: false

  # Stop and remove the Besu container when the sweep finishes (or on error).
  # Set false to leave it running for inspection.
  stop_container_on_exit: true
